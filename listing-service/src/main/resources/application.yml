server:
  port: 8082

spring:
  application:
    name: listing-service
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:5432/${DB_NAME:hvostid_listing}
    username: ${DB_USER:hvostid}
    password: ${DB_PASSWORD:hvostid}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

hvostid:
  passport-service:
    url: http://${PASSPORT_SERVICE_HOST:localhost}:8083

management:
  endpoints:
    web:
      exposure:
        include: health, info

logging:
  level:
    root: INFO
    ru.hvostid: DEBUG
