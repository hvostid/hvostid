spring:
    cloud:
        gateway:
            routes:
                -   id: auth-service
                    uri: http://localhost:8081
                    predicates:
                        - Path=/api/v1/auth/**, /api/v1/profile/**

                -   id: listing-service
                    uri: http://localhost:8082
                    predicates:
                        - Path=/api/v1/listings/**

                -   id: passport-service
                    uri: http://localhost:8083
                    predicates:
                        - Path=/api/v1/passports/**

                -   id: matching-service
                    uri: http://localhost:8084
                    predicates:
                        - Path=/api/v1/match/**

management:
    endpoints:
        web:
            exposure:
                include: health, info
