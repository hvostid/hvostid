server:
    port: 8080

spring:
    application:
        name: api-gateway
    cloud:
        gateway:
            server:
                webmvc:
                    routes:
                        -   id: auth-service
                            uri: http://${AUTH_SERVICE_HOST:localhost}:8081
                            predicates:
                                - Path=/api/v1/auth/**, /api/v1/profile/**

                        -   id: listing-service
                            uri: http://${LISTING_SERVICE_HOST:localhost}:8082
                            predicates:
                                - Path=/api/v1/listings/**

                        -   id: passport-service
                            uri: http://${PASSPORT_SERVICE_HOST:localhost}:8083
                            predicates:
                                - Path=/api/v1/passports/**

                        -   id: matching-service
                            uri: http://${MATCHING_SERVICE_HOST:localhost}:8084
                            predicates:
                                - Path=/api/v1/match/**

                        # Proxy each downstream service's /v3/api-docs so the
                        # aggregated Swagger UI (served by this gateway) can
                        # fetch every spec without cross-origin requests.
                        -   id: auth-service-openapi
                            uri: http://${AUTH_SERVICE_HOST:localhost}:8081
                            predicates:
                                - Path=/v3/api-docs/auth
                            filters:
                                - SetPath=/v3/api-docs

                        -   id: listing-service-openapi
                            uri: http://${LISTING_SERVICE_HOST:localhost}:8082
                            predicates:
                                - Path=/v3/api-docs/listing
                            filters:
                                - SetPath=/v3/api-docs

                        -   id: passport-service-openapi
                            uri: http://${PASSPORT_SERVICE_HOST:localhost}:8083
                            predicates:
                                - Path=/v3/api-docs/passport
                            filters:
                                - SetPath=/v3/api-docs

                        -   id: matching-service-openapi
                            uri: http://${MATCHING_SERVICE_HOST:localhost}:8084
                            predicates:
                                - Path=/v3/api-docs/matching
                            filters:
                                - SetPath=/v3/api-docs

hvostid:
    auth:
        introspect-url: http://${AUTH_SERVICE_HOST:localhost}:8081/internal/auth/introspect
        introspect-timeout: 3s
        public-paths:
            - /api/v1/auth/login
            - /api/v1/auth/register
            - /actuator/**
            - /swagger-ui.html
            - /swagger-ui/**
            - /v3/api-docs
            - /v3/api-docs/**
    rate-limit:
        replenish-rate: 20
        burst-capacity: 40

springdoc:
    api-docs:
        path: /v3/api-docs
    swagger-ui:
        path: /swagger-ui.html
        # Aggregated Swagger UI: lets the user pick a service from the
        # "Select a definition" dropdown. Each URL is served by a route
        # above that forwards to the corresponding service.
        urls:
            -   name: gateway
                url: /v3/api-docs
            -   name: auth-service
                url: /v3/api-docs/auth
            -   name: listing-service
                url: /v3/api-docs/listing
            -   name: passport-service
                url: /v3/api-docs/passport
            -   name: matching-service
                url: /v3/api-docs/matching

management:
    endpoints:
        web:
            exposure:
                include: health, info

logging:
    level:
        root: INFO
        ru.hvostid: DEBUG
