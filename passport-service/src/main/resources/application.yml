server:
    port: 8083

spring:
    application:
        name: passport-service
    datasource:
        url: jdbc:postgresql://${DB_HOST:localhost}:5432/${DB_NAME:hvostid_passport}
        username: ${DB_USER:hvostid}
        password: ${DB_PASSWORD:hvostid}
    jpa:
        hibernate:
            ddl-auto: validate
        open-in-view: false
        properties:
            hibernate:
                dialect: org.hibernate.dialect.PostgreSQLDialect
    servlet:
        multipart:
            max-file-size: 10MB
            max-request-size: 20MB

hvostid:
    minio:
        url: http://${MINIO_HOST:localhost}:9000
        access-key: ${MINIO_ACCESS_KEY:minioadmin}
        secret-key: ${MINIO_SECRET_KEY:minioadmin}
        bucket: pet-documents

management:
    endpoints:
        web:
            exposure:
                include: health, info

logging:
    level:
        root: INFO
        ru.hvostid: DEBUG
