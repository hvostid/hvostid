server:
    port: 8083

spring:
    application:
        name: passport-service
    datasource:
        url: jdbc:postgresql://${DB_HOST:localhost}:5432/${DB_NAME:hvostid_passport}
        username: ${DB_USER:hvostid}
        password: ${DB_PASSWORD:hvostid}
    flyway:
        enabled: true
        baseline-on-migrate: true
        locations: classpath:db/migration
        validate-on-migrate: true
    jpa:
        hibernate:
            ddl-auto: validate
        open-in-view: false
    servlet:
        multipart:
            max-file-size: 10MB
            max-request-size: 20MB

hvostid:
    minio:
        url: http://${MINIO_HOST:localhost}:9000
        access-key: ${MINIO_ACCESS_KEY:minioadmin}
        secret-key: ${MINIO_SECRET_KEY:minioadmin}
        buckets:
            documents: ${MINIO_DOCUMENTS_BUCKET:pet-documents}
            photos: ${MINIO_PHOTOS_BUCKET:pet-photos}
    listing-service:
        url: http://${LISTING_SERVICE_HOST:localhost}:8082
        connect-timeout: 2s
        read-timeout: 3s

management:
    endpoints:
        web:
            exposure:
                include: health, info

logging:
    level:
        root: INFO
        ru.hvostid: DEBUG
