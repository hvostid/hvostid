services:

    # --- Infrastructure ---

    postgres:
        build:
            context: .
            dockerfile: docker/postgres/Dockerfile
        container_name: hvostid-postgres
        restart: unless-stopped
        mem_limit: 256m
        environment:
            POSTGRES_USER: ${DB_USER}
            POSTGRES_PASSWORD: ${DB_PASSWORD}
        volumes:
            - postgres-data:/var/lib/postgresql
        healthcheck:
            test: [ "CMD-SHELL", "pg_isready -U ${DB_USER}" ]
            interval: 5s
            timeout: 3s
            retries: 5

    minio:
        image: minio/minio
        container_name: hvostid-minio
        restart: unless-stopped
        mem_limit: 256m
        command: server /data --console-address ":9001"
        environment:
            MINIO_ROOT_USER: ${MINIO_ACCESS_KEY}
            MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY}
        volumes:
            - minio-data:/data
        healthcheck:
            test: [ "CMD", "mc", "ready", "local" ]
            interval: 5s
            timeout: 3s
            retries: 5

    minio-init:
        image: minio/mc
        container_name: hvostid-minio-init
        depends_on:
            minio:
                condition: service_healthy
        environment:
            MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY}
            MINIO_SECRET_KEY: ${MINIO_SECRET_KEY}
            MINIO_DOCUMENTS_BUCKET: ${MINIO_DOCUMENTS_BUCKET:-pet-documents}
            MINIO_PHOTOS_BUCKET: ${MINIO_PHOTOS_BUCKET:-pet-photos}
        entrypoint: >
            /bin/sh -c "
            mc alias set local http://minio:9000 $$MINIO_ACCESS_KEY $$MINIO_SECRET_KEY;
            mc mb --ignore-existing local/$$MINIO_DOCUMENTS_BUCKET;
            mc mb --ignore-existing local/$$MINIO_PHOTOS_BUCKET;
            exit 0;
            "

    # --- Application Services ---

    api-gateway:
        image: ghcr.io/${GHCR_OWNER}/hvostid-api-gateway:${IMAGE_TAG:-latest}
        container_name: hvostid-gateway
        restart: unless-stopped
        mem_limit: 512m
        ports:
            - "8080:8080"
        environment:
            SPRING_PROFILES_ACTIVE: prod
            HVOSTID_CORS_ALLOWED_ORIGINS: ${HVOSTID_CORS_ALLOWED_ORIGINS}
            AUTH_SERVICE_HOST: auth-service
            LISTING_SERVICE_HOST: listing-service
            PASSPORT_SERVICE_HOST: passport-service
            MATCHING_SERVICE_HOST: matching-service
        depends_on:
            auth-service:
                condition: service_healthy
        healthcheck:
            test: [ "CMD-SHELL", "wget -qO- http://localhost:8080/actuator/health || exit 1" ]
            interval: 10s
            timeout: 5s
            retries: 5
            start_period: 30s

    auth-service:
        image: ghcr.io/${GHCR_OWNER}/hvostid-auth-service:${IMAGE_TAG:-latest}
        container_name: hvostid-auth
        restart: unless-stopped
        mem_limit: 512m
        environment:
            SERVER_PORT: 8081
            SPRING_PROFILES_ACTIVE: prod
            DB_HOST: postgres
            DB_NAME: hvostid_auth
            DB_USER: ${DB_USER}
            DB_PASSWORD: ${DB_PASSWORD}
        depends_on:
            postgres:
                condition: service_healthy
        healthcheck:
            test: [ "CMD-SHELL", "wget -qO- http://localhost:8081/actuator/health || exit 1" ]
            interval: 10s
            timeout: 5s
            retries: 5
            start_period: 30s

    listing-service:
        image: ghcr.io/${GHCR_OWNER}/hvostid-listing-service:${IMAGE_TAG:-latest}
        container_name: hvostid-listing
        restart: unless-stopped
        mem_limit: 512m
        environment:
            SERVER_PORT: 8082
            SPRING_PROFILES_ACTIVE: prod
            DB_HOST: postgres
            DB_NAME: hvostid_listing
            DB_USER: ${DB_USER}
            DB_PASSWORD: ${DB_PASSWORD}
            PASSPORT_SERVICE_HOST: passport-service
        depends_on:
            postgres:
                condition: service_healthy
        healthcheck:
            test: [ "CMD-SHELL", "wget -qO- http://localhost:8082/actuator/health || exit 1" ]
            interval: 10s
            timeout: 5s
            retries: 5
            start_period: 30s

    passport-service:
        image: ghcr.io/${GHCR_OWNER}/hvostid-passport-service:${IMAGE_TAG:-latest}
        container_name: hvostid-passport
        restart: unless-stopped
        mem_limit: 512m
        environment:
            SERVER_PORT: 8083
            SPRING_PROFILES_ACTIVE: prod
            DB_HOST: postgres
            DB_NAME: hvostid_passport
            DB_USER: ${DB_USER}
            DB_PASSWORD: ${DB_PASSWORD}
            MINIO_HOST: minio
            MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY}
            MINIO_SECRET_KEY: ${MINIO_SECRET_KEY}
            MINIO_DOCUMENTS_BUCKET: ${MINIO_DOCUMENTS_BUCKET:-pet-documents}
            MINIO_PHOTOS_BUCKET: ${MINIO_PHOTOS_BUCKET:-pet-photos}
        depends_on:
            postgres:
                condition: service_healthy
            minio:
                condition: service_healthy
        healthcheck:
            test: [ "CMD-SHELL", "wget -qO- http://localhost:8083/actuator/health || exit 1" ]
            interval: 10s
            timeout: 5s
            retries: 5
            start_period: 30s

    matching-service:
        image: ghcr.io/${GHCR_OWNER}/hvostid-matching-service:${IMAGE_TAG:-latest}
        container_name: hvostid-matching
        restart: unless-stopped
        mem_limit: 512m
        environment:
            SERVER_PORT: 8084
            SPRING_PROFILES_ACTIVE: prod
            DB_HOST: postgres
            DB_NAME: hvostid_matching
            DB_USER: ${DB_USER}
            DB_PASSWORD: ${DB_PASSWORD}
            LISTING_SERVICE_HOST: listing-service
            PASSPORT_SERVICE_HOST: passport-service
        depends_on:
            postgres:
                condition: service_healthy
        healthcheck:
            test: [ "CMD-SHELL", "wget -qO- http://localhost:8084/actuator/health || exit 1" ]
            interval: 10s
            timeout: 5s
            retries: 5
            start_period: 30s

    # --- Frontend ---

    frontend:
        image: ghcr.io/${GHCR_OWNER}/hvostid-frontend:${IMAGE_TAG:-latest}
        container_name: hvostid-frontend
        restart: unless-stopped
        mem_limit: 512m
        ports:
            - "80:80"
        depends_on:
            api-gateway:
                condition: service_healthy

volumes:
    postgres-data:
    minio-data:
