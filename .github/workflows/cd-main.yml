name: CD - Main Branch

on:
    push:
        branches: [ main ]

permissions:
    contents: read
    packages: write

env:
    REGISTRY: ghcr.io
    IMAGE_PREFIX: ghcr.io/${{ github.repository_owner }}/hvostid

jobs:
    verify:
        runs-on: ubuntu-latest

        steps:
            -   name: Checkout code
                uses: actions/checkout@v6

            -   name: Set up JDK 25
                uses: actions/setup-java@v5
                with:
                    distribution: temurin
                    java-version: 25

            -   name: Setup Gradle
                uses: gradle/actions/setup-gradle@v5

            -   name: Build and run tests
                run: ./gradlew build

            -   name: Setup Node.js
                uses: actions/setup-node@v6
                with:
                    node-version: 24
                    cache: npm
                    cache-dependency-path: frontend/package-lock.json

            -   name: Build frontend
                working-directory: frontend
                run: |
                    npm ci
                    npm run build

    build-backend:
        needs: verify
        runs-on: ubuntu-latest

        strategy:
            fail-fast: false
            matrix:
                service:
                    - api-gateway
                    - auth-service
                    - listing-service
                    - passport-service
                    - matching-service

        steps:
            -   name: Checkout code
                uses: actions/checkout@v6

            -   name: Log in to GitHub Container Registry
                uses: docker/login-action@v4
                with:
                    registry: ${{ env.REGISTRY }}
                    username: ${{ github.actor }}
                    password: ${{ secrets.GITHUB_TOKEN }}

            -   name: Set up Docker Buildx
                uses: docker/setup-buildx-action@v3

            -   name: Compute short SHA
                id: sha
                run: echo "value=$(echo ${{ github.sha }} | cut -c1-7)" >> "$GITHUB_OUTPUT"

            -   name: Build and push ${{ matrix.service }}
                uses: docker/build-push-action@v6
                with:
                    context: .
                    file: Dockerfile
                    build-args: SERVICE_NAME=${{ matrix.service }}
                    push: true
                    tags: |
                        ${{ env.IMAGE_PREFIX }}-${{ matrix.service }}:${{ steps.sha.outputs.value }}
                        ${{ env.IMAGE_PREFIX }}-${{ matrix.service }}:latest
                    cache-from: |
                        type=gha,scope=hvostid-deps
                        type=gha,scope=hvostid-${{ matrix.service }}
                    cache-to: type=gha,mode=max,scope=hvostid-${{ matrix.service }}

    build-frontend:
        needs: verify
        runs-on: ubuntu-latest

        steps:
            -   name: Checkout code
                uses: actions/checkout@v6

            -   name: Log in to GitHub Container Registry
                uses: docker/login-action@v4
                with:
                    registry: ${{ env.REGISTRY }}
                    username: ${{ github.actor }}
                    password: ${{ secrets.GITHUB_TOKEN }}

            -   name: Set up Docker Buildx
                uses: docker/setup-buildx-action@v3

            -   name: Compute short SHA
                id: sha
                run: echo "value=$(echo ${{ github.sha }} | cut -c1-7)" >> "$GITHUB_OUTPUT"

            -   name: Build and push frontend
                uses: docker/build-push-action@v6
                with:
                    context: ./frontend
                    push: true
                    tags: |
                        ${{ env.IMAGE_PREFIX }}-frontend:${{ steps.sha.outputs.value }}
                        ${{ env.IMAGE_PREFIX }}-frontend:latest
                    cache-from: type=gha,scope=hvostid-frontend
                    cache-to: type=gha,mode=max,scope=hvostid-frontend

    smoke-test:
        runs-on: ubuntu-latest
        needs: [ build-backend, build-frontend ]

        steps:
            -   name: Checkout code
                uses: actions/checkout@v6

            -   name: Log in to GitHub Container Registry
                uses: docker/login-action@v4
                with:
                    registry: ${{ env.REGISTRY }}
                    username: ${{ github.actor }}
                    password: ${{ secrets.GITHUB_TOKEN }}

            -   name: Compute short SHA
                id: sha
                run: echo "value=$(echo ${{ github.sha }} | cut -c1-7)" >> "$GITHUB_OUTPUT"

            # Re-tag to the names docker-compose.yml expects.
            -   name: Pull and re-tag images
                run: |
                    SHORT_SHA="${{ steps.sha.outputs.value }}"
                    for service in api-gateway auth-service listing-service passport-service matching-service frontend; do
                        SRC="${{ env.IMAGE_PREFIX }}-${service}:${SHORT_SHA}"
                        DST="hvostid-${service}:latest"
                        docker pull "$SRC"
                        docker tag "$SRC" "$DST"
                    done

            -   name: Start all services
                run: docker compose up -d

            -   name: Check service health endpoints
                run: |
                    ENDPOINTS=(
                        "http://localhost:8080/actuator/health api-gateway"
                        "http://localhost:8081/actuator/health auth-service"
                        "http://localhost:8082/actuator/health listing-service"
                        "http://localhost:8083/actuator/health passport-service"
                        "http://localhost:8084/actuator/health matching-service"
                    )

                    MAX_ATTEMPTS=24
                    INTERVAL=5

                    FAILED=0

                    for ENTRY in "${ENDPOINTS[@]}"; do
                        URL=$(echo "$ENTRY" | awk '{print $1}')
                        NAME=$(echo "$ENTRY" | awk '{print $2}')

                        echo "--- Waiting for ${NAME} at ${URL} ---"

                        HEALTHY=false
                        for i in $(seq 1 $MAX_ATTEMPTS); do
                            HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" --max-time 5 "${URL}" 2>/dev/null || true)
                            if [ "$HTTP_CODE" = "200" ]; then
                                echo "OK: ${NAME} returned 200 (attempt ${i})"
                                HEALTHY=true
                                break
                            fi
                            echo "  attempt ${i}/${MAX_ATTEMPTS}: ${NAME} returned ${HTTP_CODE}, retrying in ${INTERVAL}s..."
                            sleep $INTERVAL
                        done

                        if [ "$HEALTHY" = false ]; then
                            echo "FAIL: ${NAME} did not become healthy after ${MAX_ATTEMPTS} attempts"
                            FAILED=1
                        fi
                    done

                    if [ "$FAILED" -eq 1 ]; then
                        echo ""
                        echo "=== Docker container status ==="
                        docker compose ps -a
                        echo ""
                        echo "=== Docker container logs ==="
                        docker compose logs --tail=50
                        exit 1
                    fi

                    echo ""
                    echo "All health checks passed."

            -   name: Tear down
                if: always()
                run: docker compose down -v
