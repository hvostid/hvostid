name: CD - Main Branch

on:
  push:
    branches: [ main ]

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/${{ github.repository_owner }}/hvostid

jobs:
  build-and-publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up JDK 25
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 25

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v5

      - name: Build and run tests
        run: ./gradlew build

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Build frontend
        working-directory: frontend
        run: |
          npm ci
          npm run build

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker images
        run: |
          SHORT_SHA=$(echo ${{ github.sha }} | cut -c1-7)
          for service in api-gateway auth-service listing-service passport-service matching-service; do
            docker build \
              --build-arg SERVICE_NAME=$service \
              -t ${{ env.IMAGE_PREFIX }}-${service}:${SHORT_SHA} \
              -t ${{ env.IMAGE_PREFIX }}-${service}:latest \
              .
            docker push ${{ env.IMAGE_PREFIX }}-${service}:${SHORT_SHA}
            docker push ${{ env.IMAGE_PREFIX }}-${service}:latest
          done
          docker build \
            -t ${{ env.IMAGE_PREFIX }}-frontend:${SHORT_SHA} \
            -t ${{ env.IMAGE_PREFIX }}-frontend:latest \
            ./frontend
          docker push ${{ env.IMAGE_PREFIX }}-frontend:${SHORT_SHA}
          docker push ${{ env.IMAGE_PREFIX }}-frontend:latest

  smoke-test:
    runs-on: ubuntu-latest
    needs: build-and-publish

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Start infrastructure
        run: |
          docker compose up -d postgres minio minio-init
          sleep 10

      - name: Check infrastructure health
        run: |
          docker compose exec -T postgres pg_isready -U hvostid
          echo "PostgreSQL is ready"
