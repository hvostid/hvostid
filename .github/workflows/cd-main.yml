name: CD - Main Branch

on:
    push:
        branches: [ main ]

permissions:
    contents: read
    packages: write
    security-events: write
    actions: read

env:
    REGISTRY: ghcr.io
    IMAGE_PREFIX: ghcr.io/${{ github.repository_owner }}/hvostid

jobs:
    test:
        runs-on: ubuntu-latest

        steps:
            -   name: Checkout code
                uses: actions/checkout@v6

            -   name: Set up JDK 25
                uses: actions/setup-java@v5
                with:
                    distribution: temurin
                    java-version: 25

            -   name: Setup Gradle
                uses: gradle/actions/setup-gradle@v6

            -   name: Run tests
                run: ./gradlew test

            -   name: Upload test results
                if: always()
                uses: actions/upload-artifact@v4
                with:
                    name: test-results
                    path: "**/build/reports/tests/"

    publish-backend:
        needs: test
        runs-on: ubuntu-latest

        strategy:
            fail-fast: false
            matrix:
                service:
                    - api-gateway
                    - auth-service
                    - listing-service
                    - passport-service
                    - matching-service

        steps:
            -   name: Checkout code
                uses: actions/checkout@v6

            -   name: Compute short SHA
                id: sha
                run: echo "short=$(echo ${{ github.sha }} | cut -c1-7)" >> $GITHUB_OUTPUT

            -   name: Set up Docker Buildx
                uses: docker/setup-buildx-action@v4

            -   name: Log in to GitHub Container Registry
                uses: docker/login-action@v4
                with:
                    registry: ${{ env.REGISTRY }}
                    username: ${{ github.actor }}
                    password: ${{ secrets.GITHUB_TOKEN }}

            -   name: Build and push ${{ matrix.service }}
                uses: docker/build-push-action@v7
                with:
                    context: .
                    file: Dockerfile
                    build-args: SERVICE_NAME=${{ matrix.service }}
                    push: true
                    tags: |
                        ${{ env.IMAGE_PREFIX }}-${{ matrix.service }}:${{ steps.sha.outputs.short }}
                        ${{ env.IMAGE_PREFIX }}-${{ matrix.service }}:latest
                    cache-from: type=gha,scope=hvostid-${{ matrix.service }}
                    cache-to: type=gha,mode=max,scope=hvostid-${{ matrix.service }}

    publish-frontend:
        needs: test
        runs-on: ubuntu-latest

        steps:
            -   name: Checkout code
                uses: actions/checkout@v6

            -   name: Compute short SHA
                id: sha
                run: echo "short=$(echo ${{ github.sha }} | cut -c1-7)" >> $GITHUB_OUTPUT

            -   name: Set up Docker Buildx
                uses: docker/setup-buildx-action@v4

            -   name: Log in to GitHub Container Registry
                uses: docker/login-action@v4
                with:
                    registry: ${{ env.REGISTRY }}
                    username: ${{ github.actor }}
                    password: ${{ secrets.GITHUB_TOKEN }}

            -   name: Build and push frontend
                uses: docker/build-push-action@v7
                with:
                    context: ./frontend
                    push: true
                    tags: |
                        ${{ env.IMAGE_PREFIX }}-frontend:${{ steps.sha.outputs.short }}
                        ${{ env.IMAGE_PREFIX }}-frontend:latest
                    cache-from: type=gha,scope=hvostid-frontend
                    cache-to: type=gha,mode=max,scope=hvostid-frontend

    scan:
        needs: [ publish-backend, publish-frontend ]
        runs-on: ubuntu-latest

        env:
            DEFECTDOJO_URL: ${{ secrets.DEFECTDOJO_URL }}
            DEFECTDOJO_TOKEN: ${{ secrets.DEFECTDOJO_TOKEN }}
            DEFECTDOJO_PRODUCT: HvostID
            DEFECTDOJO_ENGAGEMENT: CI/CD

        strategy:
            fail-fast: false
            matrix:
                service:
                    - api-gateway
                    - auth-service
                    - listing-service
                    - passport-service
                    - matching-service
                    - frontend

        steps:
            -   name: Checkout code
                uses: actions/checkout@v6

            -   name: Log in to GitHub Container Registry
                uses: docker/login-action@v4
                with:
                    registry: ${{ env.REGISTRY }}
                    username: ${{ github.actor }}
                    password: ${{ secrets.GITHUB_TOKEN }}

            -   name: Compute short SHA
                id: sha
                run: echo "short=$(echo ${{ github.sha }} | cut -c1-7)" >> $GITHUB_OUTPUT

            -   name: Print Trivy report for ${{ matrix.service }}
                uses: aquasecurity/trivy-action@v0.36.0
                with:
                    image-ref: ${{ env.IMAGE_PREFIX }}-${{ matrix.service }}:${{ steps.sha.outputs.short }}
                    format: table
                    severity: CRITICAL,HIGH
                    ignore-unfixed: true
                    exit-code: 0
                    trivyignores: .trivyignore

            -   name: Generate Trivy JSON for ${{ matrix.service }}
                uses: aquasecurity/trivy-action@v0.36.0
                with:
                    image-ref: ${{ env.IMAGE_PREFIX }}-${{ matrix.service }}:${{ steps.sha.outputs.short }}
                    format: json
                    output: trivy-${{ matrix.service }}.json
                    severity: CRITICAL,HIGH,MEDIUM,LOW,UNKNOWN
                    ignore-unfixed: false
                    exit-code: 0

            -   name: Scan ${{ matrix.service }} with Trivy
                uses: aquasecurity/trivy-action@v0.36.0
                with:
                    image-ref: ${{ env.IMAGE_PREFIX }}-${{ matrix.service }}:${{ steps.sha.outputs.short }}
                    format: sarif
                    output: trivy-${{ matrix.service }}.sarif
                    severity: CRITICAL
                    exit-code: 1
                    ignore-unfixed: true
                    trivyignores: .trivyignore

            -   name: Upload Trivy SARIF for ${{ matrix.service }}
                if: always()
                uses: github/codeql-action/upload-sarif@v4
                with:
                    sarif_file: trivy-${{ matrix.service }}.sarif
                    category: trivy-${{ matrix.service }}

            -   name: Reimport ${{ matrix.service }} into DefectDojo
                if: always() && env.DEFECTDOJO_URL != ''
                continue-on-error: true
                env:
                    SCAN_FILE: trivy-${{ matrix.service }}.json
                    SERVICE: ${{ matrix.service }}
                    SHA: ${{ github.sha }}
                    SHORT_SHA: ${{ steps.sha.outputs.short }}
                    BRANCH: ${{ github.ref_name }}
                run: |
                    set -euo pipefail

                    if [ ! -s "${SCAN_FILE}" ]; then
                        echo "WARN: ${SCAN_FILE} is missing or empty, skipping upload"
                        exit 0
                    fi

                    SCAN_DATE="$(date -u +%Y-%m-%d)"

                    HTTP_STATUS=$(curl --silent --show-error \
                        --output /tmp/dojo-response.json \
                        --write-out "%{http_code}" \
                        --request POST \
                        "${DEFECTDOJO_URL%/}/api/v2/reimport-scan/" \
                        --header "Authorization: Token ${DEFECTDOJO_TOKEN}" \
                        --header "accept: application/json" \
                        --form "scan_type=Trivy Scan" \
                        --form "file=@${SCAN_FILE};type=application/json" \
                        --form "product_name=${DEFECTDOJO_PRODUCT}" \
                        --form "engagement_name=${DEFECTDOJO_ENGAGEMENT}" \
                        --form "test_title=trivy-${SERVICE}" \
                        --form "auto_create_context=true" \
                        --form "close_old_findings=true" \
                        --form "close_old_findings_product_scope=false" \
                        --form "minimum_severity=Info" \
                        --form "active=true" \
                        --form "verified=false" \
                        --form "scan_date=${SCAN_DATE}" \
                        --form "branch_tag=${BRANCH}" \
                        --form "commit_hash=${SHA}" \
                        --form "version=${SHORT_SHA}" \
                        --form "tags=service:${SERVICE},branch:${BRANCH}")

                    echo "DefectDojo HTTP ${HTTP_STATUS}"
                    cat /tmp/dojo-response.json || true
                    echo ""

                    if [ "${HTTP_STATUS}" -lt 200 ] || [ "${HTTP_STATUS}" -ge 300 ]; then
                        echo "ERROR: DefectDojo upload failed for ${SERVICE}"
                        exit 1
                    fi

    smoke-test:
        runs-on: ubuntu-latest
        needs: [ publish-backend, publish-frontend ]

        steps:
            -   name: Checkout code
                uses: actions/checkout@v6

            -   name: Compute short SHA
                id: sha
                run: echo "short=$(echo ${{ github.sha }} | cut -c1-7)" >> $GITHUB_OUTPUT

            -   name: Log in to GitHub Container Registry
                uses: docker/login-action@v4
                with:
                    registry: ${{ env.REGISTRY }}
                    username: ${{ github.actor }}
                    password: ${{ secrets.GITHUB_TOKEN }}

            -   name: Pull and start services
                env:
                    IMAGE_TAG: ${{ steps.sha.outputs.short }}
                    REPO_OWNER: ${{ github.repository_owner }}
                run: |
                    docker compose -f docker-compose.yml -f docker-compose.ci.yml pull
                    docker compose -f docker-compose.yml -f docker-compose.ci.yml up -d

            -   name: Check service health endpoints
                run: |
                    ENDPOINTS=(
                        "http://localhost:8080/actuator/health api-gateway"
                        "http://localhost:8081/actuator/health auth-service"
                        "http://localhost:8082/actuator/health listing-service"
                        "http://localhost:8083/actuator/health passport-service"
                        "http://localhost:8084/actuator/health matching-service"
                    )

                    MAX_ATTEMPTS=24
                    INTERVAL=5

                    FAILED=0

                    for ENTRY in "${ENDPOINTS[@]}"; do
                        URL=$(echo "$ENTRY" | awk '{print $1}')
                        NAME=$(echo "$ENTRY" | awk '{print $2}')

                        echo "--- Waiting for ${NAME} at ${URL} ---"

                        HEALTHY=false
                        for i in $(seq 1 $MAX_ATTEMPTS); do
                            HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" --max-time 5 "${URL}" 2>/dev/null || true)
                            if [ "$HTTP_CODE" = "200" ]; then
                                echo "OK: ${NAME} returned 200 (attempt ${i})"
                                HEALTHY=true
                                break
                            fi
                            echo "  attempt ${i}/${MAX_ATTEMPTS}: ${NAME} returned ${HTTP_CODE}, retrying in ${INTERVAL}s..."
                            sleep $INTERVAL
                        done

                        if [ "$HEALTHY" = false ]; then
                            echo "FAIL: ${NAME} did not become healthy after ${MAX_ATTEMPTS} attempts"
                            FAILED=1
                        fi
                    done

                    if [ "$FAILED" -eq 1 ]; then
                        echo ""
                        echo "=== Docker container status ==="
                        docker compose ps -a
                        echo ""
                        echo "=== Docker container logs ==="
                        docker compose logs --tail=50
                        exit 1
                    fi

                    echo ""
                    echo "All health checks passed."

            -   name: Tear down
                if: always()
                env:
                    IMAGE_TAG: ${{ steps.sha.outputs.short }}
                    REPO_OWNER: ${{ github.repository_owner }}
                run: docker compose -f docker-compose.yml -f docker-compose.ci.yml down -v
