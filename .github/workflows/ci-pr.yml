name: CI - Pull Request

on:
    pull_request:
        branches: [ main ]

permissions:
    contents: read

env:
    REGISTRY: ghcr.io
    IMAGE_PREFIX: ghcr.io/${{ github.repository_owner }}/hvostid

jobs:
    verify:
        runs-on: ubuntu-latest

        steps:
            -   name: Checkout code
                uses: actions/checkout@v6

            -   name: Set up JDK 25
                uses: actions/setup-java@v5
                with:
                    distribution: temurin
                    java-version: 25

            -   name: Setup Gradle
                uses: gradle/actions/setup-gradle@v6

            -   name: Run tests and checks
                run: ./gradlew check

            -   name: Run SonarQube scan
                if: env.SONAR_TOKEN != ''
                env:
                    SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
                    SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
                run: ./gradlew sonar

            -   name: Upload test results
                if: always()
                uses: actions/upload-artifact@v7
                with:
                    name: test-results
                    path: "**/build/reports/tests/"

    build-backend:
        needs: verify
        runs-on: ubuntu-latest

        strategy:
            fail-fast: false
            matrix:
                service:
                    - api-gateway
                    - auth-service
                    - listing-service
                    - passport-service
                    - matching-service

        steps:
            -   name: Checkout code
                uses: actions/checkout@v6

            -   name: Set up Docker BuildX
                uses: docker/setup-buildx-action@v4

            -   name: Build ${{ matrix.service }}
                uses: docker/build-push-action@v7
                with:
                    context: .
                    file: Dockerfile
                    build-args: SERVICE_NAME=${{ matrix.service }}
                    push: false
                    tags: hvostid-${{ matrix.service }}:pr
                    cache-from: |
                        type=gha,scope=hvostid-deps
                        type=gha,scope=hvostid-${{ matrix.service }}
                    cache-to: type=gha,mode=max,scope=hvostid-${{ matrix.service }}

    build-frontend:
        needs: verify
        runs-on: ubuntu-latest

        steps:
            -   name: Checkout code
                uses: actions/checkout@v6

            -   name: Set up Docker BuildX
                uses: docker/setup-buildx-action@v4

            -   name: Build frontend
                uses: docker/build-push-action@v7
                with:
                    context: ./frontend
                    push: false
                    tags: hvostid-frontend:pr
                    cache-from: type=gha,scope=hvostid-frontend
                    cache-to: type=gha,mode=max,scope=hvostid-frontend
