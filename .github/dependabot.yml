version: 2

updates:
    -   package-ecosystem: gradle
        directory: /
        schedule:
            interval: weekly
        groups:
            patch-and-minor:
                update-types:
                    - patch
                    - minor
        reviewers:
            - alphaalexey

    -   package-ecosystem: npm
        directory: /frontend
        schedule:
            interval: weekly
        groups:
            react:
                patterns:
                    - react
                    - react-dom
                    - "@types/react"
                    - "@types/react-dom"
            vite:
                patterns:
                    - vite
                    - "@vitejs/*"
            patch-and-minor:
                update-types:
                    - patch
                    - minor
        reviewers:
            - alphaalexey

    -   package-ecosystem: docker
        directory: /
        schedule:
            interval: weekly
        reviewers:
            - alphaalexey

    -   package-ecosystem: github-actions
        directory: /
        schedule:
            interval: weekly
        groups:
            patch-and-minor:
                update-types:
                    - patch
                    - minor
        reviewers:
            - alphaalexey
