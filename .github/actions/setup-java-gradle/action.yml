name: 'Set up Java and Gradle'
description: 'Installs JDK 25 (Temurin) and configures the Gradle action with caching.'

runs:
    using: composite
    steps:
        -   name: Set up JDK 25
            uses: actions/setup-java@v5
            with:
                distribution: temurin
                java-version: 25

        -   name: Setup Gradle
            uses: gradle/actions/setup-gradle@v6
