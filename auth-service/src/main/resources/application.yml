server:
    port: 8081

spring:
    application:
        name: auth-service
    datasource:
        url: jdbc:postgresql://${DB_HOST:localhost}:5432/${DB_NAME:hvostid_auth}
        username: ${DB_USER:hvostid}
        password: ${DB_PASSWORD:hvostid}
    jpa:
        hibernate:
            ddl-auto: validate
        open-in-view: false

hvostid:
    auth:
        access-token-ttl: 30m
        refresh-token-ttl: 7d

management:
    endpoints:
        web:
            exposure:
                include: health, info

logging:
    level:
        root: INFO
        ru.hvostid: DEBUG
